services:
  eea-geonetwork-mcp:
    image: eeacms/eea-geonetwork-mcp:latest
    container_name: eea-geonetwork-mcp
    ports:
      - "3001:3001"
    env_file:
      - /root/ENV_FILES/geonetwork-mcp.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3001/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

      